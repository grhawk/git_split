name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog-check:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md is part of the changeset
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          changelog_diff="$(git diff "$BASE_SHA" "$HEAD_SHA" -- CHANGELOG.md || true)"

          echo "changelog diff:"
          printf '%s\n' "$changelog_diff"

          if ! printf '%s\n' "$changed_files" | grep -Fxq "CHANGELOG.md"; then
            echo "CHANGELOG.md is not part of the changeset. Please add a changelog entry." >&2
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          set -euo pipefail
          bash -n git_split.sh
          bash -n push-tag.sh

  release-tag-default-branch-check:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect clean release tag
        id: clean-tag
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_clean=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is not a clean semver release tag. Skipping default-branch check."
          fi

      - name: Verify release tag points to the default branch
        if: steps.clean-tag.outputs.is_clean == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git fetch origin "$DEFAULT_BRANCH" --depth=1
          default_branch_ref="origin/$DEFAULT_BRANCH"

          if ! git merge-base --is-ancestor "$TAG_SHA" "$default_branch_ref"; then
            echo "Release tag ${GITHUB_REF_NAME} must point to a commit reachable from ${DEFAULT_BRANCH}." >&2
            exit 1
          fi

          echo "Release tag ${GITHUB_REF_NAME} points to a commit on ${DEFAULT_BRANCH}."

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - quality
      - release-tag-default-branch-check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect clean release tag
        id: clean-tag
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_clean=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is not a clean semver release tag. Skipping GitHub release creation."
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.clean-tag.outputs.is_clean == 'true'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          awk -v version="$TAG_NAME" '
            $0 ~ "^## \\[" version "\\]" {
              capture = 1
              next
            }
            /^## \[/ && capture {
              exit
            }
            capture {
              print
            }
          ' CHANGELOG.md > "$notes_file"

          if ! grep -q '[^[:space:]]' "$notes_file"; then
            echo "Could not find release notes for $TAG_NAME in CHANGELOG.md" >&2
            exit 1
          fi

          {
            echo "RELEASE_NOTES_FILE=$notes_file"
          } >> "$GITHUB_ENV"

      - name: Create GitHub release
        if: steps.clean-tag.outputs.is_clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NOTES_FILE: ${{ env.RELEASE_NOTES_FILE }}
        run: |
          set -euo pipefail

          gh release create "$TAG_NAME" \
            --verify-tag \
            --notes-file "$RELEASE_NOTES_FILE" \
            --latest
